<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AgroRisk | Nova Propriedade</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<section class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            Cadastro da Propriedade
        </h1>

        <p class="text-muted">
            Informe os dados da fazenda e desenhe seus limites no mapa.
        </p>

    </div>

    <div class="row">

        <!-- FORMULÁRIO -->

        <div class="col-lg-4">

            <div class="card shadow rounded-4 p-4">

                <h4 class="mb-4">
                    Informações
                </h4>

                <form id="formPropriedade">

                    <div class="mb-3">

                        <label class="form-label">
                            Nome da propriedade
                        </label>

                        <input
                            type="text"
                            id="nome"
                            class="form-control"
                            placeholder="Ex.: Fazenda Boa Vista">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Estado
                        </label>

                        <input
                            type="text"
                            id="estado"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Cidade
                        </label>

                        <input
                            type="text"
                            id="cidade"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Cultura Principal
                        </label>

                        <select
                            id="cultura"
                            class="form-select">

                            <option>Soja</option>

                            <option>Milho</option>

                            <option>Café</option>

                            <option>Algodão</option>

                            <option>Cana-de-açúcar</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Observações
                        </label>

                        <textarea
                            id="observacao"
                            rows="4"
                            class="form-control"></textarea>

                    </div>

                </form>

            </div>

        </div>

        <!-- MAPA -->

        <div class="col-lg-8">

            <div class="card shadow rounded-4 p-4">

                <div class="d-flex justify-content-between">

                    <h4>

                        Delimite sua propriedade

                    </h4>

                    <button
                        class="btn btn-outline-success"
                        id="btnPesquisar">

                        Pesquisar Local

                    </button>

                </div>

                <div
                    id="map"
                    style="height:600px;margin-top:20px;border-radius:15px;">
                </div>

                <div class="row mt-4">

                    <div class="col-md-6">

                        <div class="alert alert-success">

                            <strong>Área</strong>

                            <br>

                            <span id="area">
                                Ainda não calculada
                            </span>

                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="alert alert-primary">

                            <strong>Perímetro</strong>

                            <br>

                            <span id="perimetro">
                                Ainda não calculado
                            </span>

                        </div>

                    </div>

                </div>

                <div class="text-end">

                    <button
                        class="btn btn-danger"
                        id="limparMapa">

                        Limpar

                    </button>

                    <button
                        class="btn btn-success"
                        id="salvar">

                        Salvar Propriedade

                    </button>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script src="js/api.js"></script>

<script src="js/cadastroPropriedade.js"></script>

</body>

</html>
